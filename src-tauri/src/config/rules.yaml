invoice_types:
  train:
    keywords: ["高铁", "火车票", "车次", "G", "D", "C", "出发站", "到达站", "检票口", "电子客票"]
    patterns:
      train_number:
        - "车次[：:]?\\s*([A-Z]\\d+)"
        - "列车号[：:]?\\s*([A-Z]\\d+)"
        - "([A-Z]\\d+)次"
        - "\\s([A-Z]\\d+)\\s"
      departure_station:
        - "出发站[：:]?\\s*([^\\s]+)"
        - "出发地[：:]?\\s*([^\\s]+)"
        - "FROM\\s*([^\\s]+)"
        - "^([^\\s]+)\\s+[A-Z]\\d+\\s"
        - "([\\u4e00-\\u9fa5]+站?)\\s+[A-Z]\\d+\\s+[\\u4e00-\\u9fa5]"
      arrival_station:
        - "到达站[：:]?\\s*([^\\s]+)"
        - "目的地[：:]?\\s*([^\\s]+)"
        - "TO\\s*([^\\s]+)"
        - "\\s[A-Z]\\d+\\s+([^\\s]+)$"
        - "[A-Z]\\d+\\s+([\\u4e00-\\u9fa5]+站?)"
      departure_time:
        - "出发时间[：:]?\\s*(\\d{4}-\\d{2}-\\d{2}\\s+\\d{2}:\\d{2})"
        - "发车时间[：:]?\\s*(\\d{4}-\\d{2}-\\d{2}\\s+\\d{2}:\\d{2})"
        - "日期[：:]?\\s*(\\d{4}-\\d{2}-\\d{2})"
        - "(\\d{4})年(\\d{2})月(\\d{2})日\\s+(\\d{2}:\\d{2})开"

  hotel:
    keywords: ["酒店", "入住", "离店", "房费", "住宿费"]
    patterns:
      hotel_name:
        - "酒店名称[：:]?\\s*(.+?)\\s*\\n"
        - "名称[：:]?\\s*(.+?)\\s*\\n"
        - "酒店[：:]?\\s*(.+?)\\s*\\n"
      check_in_date:
        - "入住日期[：:]?\\s*(\\d{4}-\\d{2}-\\d{2})"
        - "入店日期[：:]?\\s*(\\d{4}-\\d{2}-\\d{2})"
        - "入住[：:]?\\s*(\\d{4}-\\d{2}-\\d{2})"
      check_out_date:
        - "离店日期[：:]?\\s*(\\d{4}-\\d{2}-\\d{2})"
        - "退房日期[：:]?\\s*(\\d{4}-\\d{2}-\\d{2})"
        - "离店[：:]?\\s*(\\d{4}-\\d{2}-\\d{2})"
      nights:
        - "间夜数[：:]?\\s*(\\d+)"
        - "间数[：:]?\\s*(\\d+)"

  car:
    keywords: ["用车", "车费", "里程", "交通费", "滴滴", "出租"]
    patterns:
      car_date:
        - "用车时间[：:]?\\s*(\\d{4}-\\d{2}-\\d{2})"
        - "日期[：:]?\\s*(\\d{4}-\\d{2}-\\d{2})"
      mileage:
        - "里程[：:]?\\s*([\\d.]+)"
        - "公里数[：:]?\\s*([\\d.]+)"

  flight:
    keywords: ["机票", "经济舱", "飞机", "航班号", "起飞", "降落", "登机"]
    patterns:
      flight_number:
        - "航班号[：:]?\\s*([A-Z0-9]+)"
        - "航班[：:]?\\s*([A-Z]{2}\\d+)"
      departure_city:
        - "出发城市[：:]?\\s*([^\\s]+)"
        - "始发地[：:]?\\s*([^\\s]+)"
      arrival_city:
        - "到达城市[：:]?\\s*([^\\s]+)"
        - "目的地[：:]?\\s*([^\\s]+)"
      flight_date:
        - "起飞时间[：:]?\\s*(\\d{4}-\\d{2}-\\d{2})"
        - "日期[：:]?\\s*(\\d{4}-\\d{2}-\\d{2})"

  invoice:
    keywords: ["发票", "增值税", "专用发票", "普通发票"]
    patterns:
      invoice_code:
        - "发票代码[：:]?\\s*(\\d{12})"
        - "代码[：:]?\\s*(\\d{12})"
      invoice_number:
        - "发票号码[：:]?\\s*(\\d{8})"
        - "号码[：:]?\\s*(\\d{8})"
      issue_date:
        - "开票日期[：:]?\\s*(\\d{4}-\\d{2}-\\d{2})"
        - "日期[：:]?\\s*(\\d{4}-\\d{2}-\\d{2})"