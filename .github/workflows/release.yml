name: release

# 触发：推送 v* 格式的 tag（如 v1.2.0）
# tauri-action 自动：构建 → 用私钥签名 → 上传到 GitHub Releases → 生成 latest.json
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装前端依赖
        run: npm ci

      - name: 验证签名密钥是否加载
        shell: pwsh
        run: |
          if ($env:TAURI_SIGNING_PRIVATE_KEY) {
            Write-Host "TAURI_SIGNING_PRIVATE_KEY is loaded ($($env:TAURI_SIGNING_PRIVATE_KEY.Length) chars)"
          } else {
            throw "TAURI_SIGNING_PRIVATE_KEY is missing! Check repository Secrets."
          }
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: 从 RELEASE_NOTES.md 提取当前版本说明
        id: release_notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $content = Get-Content -Raw -Path "RELEASE_NOTES.md"
          $pattern = "(?sm)^##\s*$([regex]::Escape($tag))\s*\r?\n(.*?)(?=^##\s*v|\z)"
          $match = [regex]::Match($content, $pattern)
          $body = if ($match.Success) { $match.Groups[1].Value.Trim() } else { "" }
          # 输出多行内容到 GITHUB_OUTPUT
          Add-Content -Path $env:GITHUB_OUTPUT -Value "body<<EOF"
          Add-Content -Path $env:GITHUB_OUTPUT -Value $body
          Add-Content -Path $env:GITHUB_OUTPUT -Value "EOF"
          Write-Host "Extracted release notes length: $($body.Length)"

      - name: 构建并发布（tauri-action）
        uses: tauri-apps/tauri-action@v0.5.18
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SnapClaim ${{ github.ref_name }}'
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: --ci
          updaterJsonPreferNsis: true
          includeUpdaterJson: true
