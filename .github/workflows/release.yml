name: release

# 触发：推送 v* 格式的 tag（如 v1.2.0）
# tauri-action 自动：构建 → 用私钥签名 → 上传到 GitHub Releases → 生成 latest.json
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装前端依赖
        run: npm ci

      - name: 验证签名密钥是否加载
        shell: pwsh
        run: |
          if ($env:TAURI_SIGNING_PRIVATE_KEY) {
            Write-Host "TAURI_SIGNING_PRIVATE_KEY is loaded ($($env:TAURI_SIGNING_PRIVATE_KEY.Length) chars)"
          } else {
            throw "TAURI_SIGNING_PRIVATE_KEY is missing! Check repository Secrets."
          }
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: 构建并发布（tauri-action）
        uses: tauri-apps/tauri-action@v0.5.17
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SnapClaim ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
          args: --ci
          updaterJsonPreferNsis: true
          includeUpdaterJson: true
